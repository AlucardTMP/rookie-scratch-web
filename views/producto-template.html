<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{PRODUCT_NAME}} | Rookie Scratch</title>
    <meta name="description" content="{{PRODUCT_DESCRIPTION}}">
    
    <meta name="author" content="Rookie Scratch">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#990000">
    <link rel="icon" href="/favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Grenze+Gotisch:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-image-gallery {
            text-align: center;
        }
        #main-product-image {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            border-radius: 4px;
            margin-bottom: 1rem;
        }
        .thumbnail-images {
            display: flex;
            justify-content: center;
            gap: 10px;
        }
        .thumbnail {
            width: 80px;
            height: 80px;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid transparent;
            border-radius: 4px;
            transition: border-color 0.3s;
        }
        .thumbnail.active, .thumbnail:hover {
            border-color: var(--primary-color);
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
    </div>

    <header class="sticky-nav">
        <div class="logo" style="white-space: nowrap;">ROOKIE SCRATCH</div>
        <button class="menu-toggle" aria-label="Abrir menú">
            <div class="hamburger"></div>
        </button>
        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="tatuajes.html">Tatuajes</a></li>
                <li><a href="ilustracion.html">Ilustración</a></li>
                <li><a href="tienda.html">Tienda</a></li>
                <li><a href="index.html#booking" class="cta-button cta-nav">Reservar Cita</a></li>
                <li><a href="cart.html" class="cart-link"><i class="fas fa-shopping-cart"></i><span class="cart-counter">0</span></a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="product-detail-section">
            <div class="product-detail-container">
                <div class="product-image-gallery">
                    <img src="{{MAIN_IMAGE_URL}}" alt="Vista principal de {{PRODUCT_NAME}}" id="main-product-image">
                    <div class="thumbnail-images">
                        {{THUMBNAIL_IMAGES}}
                    </div>
                </div>
                <div class="product-info">
                    <h1 class="product-title">{{PRODUCT_NAME}}</h1>
                    <p class="product-price-detail">{{PRODUCT_PRICE}}</p>
                    <div class="product-description-detail">
                        {{PRODUCT_DESCRIPTION_HTML}}
                    </div>
                    <a href="#" data-add-to-cart data-product-id="{{PRODUCT_ID}}" class="add-to-cart cta-primary">Añadir al Carrito</a>
                    <div class="social-share">
                        <p>Compartir:</p>
                        <a href="#" aria-label="Compartir en Facebook"><i class="fab fa-facebook-f"></i></a>
                        <a href="#" aria-label="Compartir en Twitter"><i class="fab fa-twitter"></i></a>
                        <a href="#" aria-label="Compartir en Pinterest"><i class="fab fa-pinterest"></i></a>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-logo-container">
            <img src="imagenes/logo-rookie.png" alt="logo rookie">
        </div>
        <div class="social-icons">
            <a href="#" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="#" target="_blank" aria-label="Twitter"><i class="fab fa-twitter"></i></a>
        </div>
        <p>&copy; 2025 Rookie Scratch. Todos los derechos reservados.</p>
    </footer>

    <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mainImage = document.getElementById('main-product-image');
            const thumbnails = document.querySelectorAll('.thumbnail');

            thumbnails.forEach(thumbnail => {
                thumbnail.addEventListener('click', function() {
                    mainImage.src = this.src;
                    // Update active state
                    thumbnails.forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                });
            });

            // Set the first thumbnail as active initially
            if (thumbnails.length > 0) {
                thumbnails[0].classList.add('active');
            }
        });
    </script>
</body>
</html>
