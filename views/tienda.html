<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - Rookie Scratch</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Ajustes específicos para que la grid de productos se vea bien */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 2rem;
            padding: 2rem 0;
        }

        .product-card {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
        }

        .product-image img {
            width: 100%;
            height: 250px;
            object-fit: cover;
        }

        .product-info {
            padding: 1.5rem;
            text-align: center;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .product-info h3 {
            margin-bottom: 0.5rem;
            font-size: 1.2rem;
        }

        .product-info .price {
            color: var(--primary-color);
            font-weight: bold;
            font-size: 1.3rem;
            margin-bottom: 1rem;
        }

        .product-info .description {
            font-size: 0.9rem;
            color: #bbb;
            margin-bottom: 1.5rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <header class="sticky-nav">
        <div class="logo">ROOKIE SCRATCH</div>
        <nav>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/tatuajes.html">Tatuajes</a></li>
                <li><a href="/ilustracion.html">Ilustración</a></li>
                <li><a href="/tienda" class="active">Tienda</a></li>
                <li><a href="/cart.html"><i class="fas fa-shopping-cart"></i></a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="shop-header" style="padding-top: 5rem; text-align: center;">
            <h1>Rookie Shop</h1>
            <p>Productos exclusivos diseñados por Rokiescratch</p>
        </section>

        <div id="productos-container" class="products-grid">
            <div style="text-align: center; grid-column: 1/-1; padding: 3rem;">
                <p>Cargando productos...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="container footer-content">
            <p>&copy; 2026 Rookie Scratch. Todos los derechos reservados.</p>
            <div class="social-links">
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-tiktok"></i></a>
            </div>
        </div>
    </footer>

    <script src="/js/main.js" type="module"></script>
</body>
</html>
