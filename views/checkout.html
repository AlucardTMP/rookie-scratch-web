<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Rookie Scratch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body>
    <header class="sticky-nav">
        <div class="logo" style="white-space: nowrap;">ROOKIE SCRATCH</div>
        <nav>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/tatuajes">Tatuajes</a></li>
                <li><a href="/ilustracion">Ilustración</a></li>
                <li><a href="/tienda">Tienda</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="checkout-section" class="checkout-section">
            <h2 data-scrollreveal>Checkout</h2>
            <div class="checkout-grid">
                <div class="checkout-card">
                    <h3>Información de Envío</h3>
                    <form id="checkout-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label for="name">Nombre Completo</label>
                                <input type="text" id="name" placeholder="Nombre Completo" required>
                                <p class="error-message"></p>
                            </div>
                            <div class="form-group">
                                <label for="email">Correo Electrónico</label>
                                <input type="email" id="email" placeholder="Correo Electrónico" required>
                                <p class="error-message"></p>
                            </div>
                        </div>

                        <div class="form-group">
                            <label for="address">Dirección de Envío</label>
                            <textarea id="address" placeholder="Dirección de Envío" rows="3" required></textarea>
                            <p class="error-message"></p>
                        </div>

                        <h3>Información de Pago</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="card-number">Número de Tarjeta</label>
                                <input type="text" id="card-number" placeholder="0000 0000 0000 0000" required>
                                <p class="error-message"></p>
                            </div>
                            <div class="form-group small">
                                <label for="expiry-date">MM/AA</label>
                                <input type="text" id="expiry-date" placeholder="MM/AA" required>
                                <p class="error-message"></p>
                            </div>
                            <div class="form-group small">
                                <label for="cvc">CVC</label>
                                <input type="text" id="cvc" placeholder="CVC" required>
                                <p class="error-message"></p>
                            </div>
                        </div>

                        <button type="submit" class="cta-primary checkout-submit">Finalizar Compra</button>
                        <p class="checkout-note">Los pagos son simulados en este entorno de prueba.</p>
                    </form>
                </div>

                <aside class="order-summary" aria-labelledby="order-summary-title">
                    <h3 id="order-summary-title">Resumen del Pedido</h3>
                    <div id="checkout-order-items" class="order-items">
                        <!-- Items del carrito se insertarán aquí -->
                    </div>
                    <div class="order-totals">
                        <div class="totals-row">
                            <span>Subtotal</span>
                            <span id="checkout-subtotal">$0.00</span>
                        </div>
                        <div class="totals-row">
                            <span>Envío</span>
                            <span id="checkout-shipping">$5.00</span>
                        </div>
                        <div class="totals-row total">
                            <span>Total</span>
                            <span id="checkout-total">$0.00</span>
                        </div>
                        <button id="place-order" class="cta-primary">Pagar Ahora</button>
                    </div>
                </aside>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="#" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p>&copy; 2025 Rookie Scratch. Todos los derechos reservados.</p>
    </footer>

    <script src="/js/main.js" type="module"></script>
</body>
</html>
