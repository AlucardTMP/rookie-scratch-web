<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - Rookie Scratch</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/all.min.css">
</head>
<body>
    <header class="sticky-nav">
        <div class="logo" style="white-space: nowrap;">ROOKIE SCRATCH</div>
        <nav>
            <ul>
                <li><a href="/">Inicio</a></li>
                <li><a href="/tatuajes">Tatuajes</a></li>
                <li><a href="/ilustracion">Ilustración</a></li>
                <li><a href="/tienda">Tienda</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="cart-section" class="cart-section">
            <h2 data-scrollreveal>Carrito de Compras</h2>
            <div id="cart-items-container" class="cart-items-container">
                <!-- Los productos del carrito se insertarán aquí -->
            </div>
            <div class="cart-summary">
                <h3>Resumen del Pedido</h3>
                <p>Total: <span id="cart-total">$0.00</span></p>
                <a href="/checkout" class="cta-primary">Proceder al Pago</a>
            </div>
        </section>
    </main>

    <footer>
        <div class="social-icons">
            <a href="#" target="_blank" aria-label="Instagram"><i class="fab fa-instagram"></i></a>
            <a href="#" target="_blank" aria-label="Facebook"><i class="fab fa-facebook"></i></a>
            <a href="#" target="_blank" aria-label="WhatsApp"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p>&copy; 2025 Rookie Scratch. Todos los derechos reservados.</p>
    </footer>

    <script src="/js/main.js" type="module"></script>
</body>
</html>
